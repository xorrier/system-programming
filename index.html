<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>System Programming in C++ — Docs</title>
  <meta name="description" content="Comprehensive system programming in C++ documentation: RAII, file I/O, memory management, OS APIs, concurrency, and Windows internals." />

  <!-- Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />

  <!-- Embedded page content (generated by build.py) -->
  <script src="pages.js"></script>

  <!-- Marked.js (markdown parser) -->
  <script src="https://cdn.jsdelivr.net/npm/marked@9/marked.min.js"></script>

  <!-- Highlight.js (syntax highlighting) -->
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/highlight.js@11/styles/github-dark.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/core.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/cpp.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/bash.min.js"></script>
  <script src="https://cdn.jsdelivr.net/npm/highlight.js@11/lib/languages/diff.min.js"></script>

  <style>
    /* ── Design Tokens ─────────────────────────────────────────── */
    :root {
      --bg:        #0d0f14;
      --bg-mid:    #12151c;
      --bg-card:   #181c26;
      --bg-hover:  #1e2433;
      --border:    #252a38;
      --border-hi: #313a56;
      --accent:    #4f8ef7;
      --accent-2:  #7c5ff7;
      --accent-grd: linear-gradient(135deg, #4f8ef7, #7c5ff7);
      --text:      #e2e8f0;
      --text-dim:  #8b97b0;
      --text-faint:#4a5568;
      --green:     #34d399;
      --yellow:    #fbbf24;
      --red:       #f87171;
      --sidebar-w: 280px;
      --topbar-h:  56px;
      --radius:    10px;
      --shadow:    0 4px 32px rgba(0,0,0,0.45);
    }

    /* ── Reset ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: var(--accent); text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Top Bar ─────────────────────────────────────────────────── */
    #topbar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: var(--topbar-h);
      background: rgba(13,15,20,0.85);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      display: flex;
      align-items: center;
      padding: 0 20px;
      z-index: 100;
      gap: 16px;
    }
    #menu-toggle {
      display: none;
      background: none;
      border: none;
      color: var(--text-dim);
      cursor: pointer;
      padding: 6px;
      border-radius: 6px;
      transition: background 0.2s;
    }
    #menu-toggle:hover { background: var(--bg-hover); color: var(--text); }
    #menu-toggle svg { display: block; }
    .logo {
      display: flex; align-items: center; gap: 10px;
      font-size: 15px; font-weight: 700; color: var(--text);
      text-decoration: none;
      white-space: nowrap;
    }
    .logo-icon {
      width: 28px; height: 28px;
      background: var(--accent-grd);
      border-radius: 7px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }
    .logo span { color: var(--text-dim); font-weight: 400; }
    .topbar-right {
      margin-left: auto;
      display: flex; align-items: center; gap: 10px;
    }
    #search-wrap {
      position: relative;
    }
    #search-input {
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: 'Inter', sans-serif;
      font-size: 13px;
      padding: 7px 12px 7px 32px;
      width: 200px;
      outline: none;
      transition: border-color 0.2s, width 0.3s, box-shadow 0.2s;
    }
    #search-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(79,142,247,0.15);
      width: 260px;
    }
    #search-input::placeholder { color: var(--text-faint); }
    #search-icon {
      position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%);
      color: var(--text-faint);
      pointer-events: none;
    }
    #search-results {
      position: absolute;
      top: calc(100% + 6px);
      left: 0; right: 0;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      display: none;
      max-height: 320px;
      overflow-y: auto;
      z-index: 200;
    }
    #search-results.open { display: block; }
    .sr-item {
      padding: 10px 14px;
      cursor: pointer;
      font-size: 13px;
      border-bottom: 1px solid var(--border);
      transition: background 0.15s;
    }
    .sr-item:last-child { border-bottom: none; }
    .sr-item:hover { background: var(--bg-hover); }
    .sr-item .sr-title { font-weight: 500; color: var(--text); }
    .sr-item .sr-phase { font-size: 11px; color: var(--text-dim); margin-top: 2px; }
    .phase-badge {
      font-size: 10px;
      font-weight: 600;
      padding: 2px 7px;
      border-radius: 20px;
      background: var(--bg-hover);
      color: var(--accent);
      border: 1px solid var(--border-hi);
      letter-spacing: 0.5px;
      text-transform: uppercase;
      white-space: nowrap;
    }

    /* ── Layout Shell ────────────────────────────────────────────── */
    #shell {
      display: flex;
      margin-top: var(--topbar-h);
      min-height: calc(100vh - var(--topbar-h));
    }

    /* ── Sidebar ─────────────────────────────────────────────────── */
    #sidebar {
      width: var(--sidebar-w);
      min-width: var(--sidebar-w);
      background: var(--bg-mid);
      border-right: 1px solid var(--border);
      position: fixed;
      top: var(--topbar-h);
      bottom: 0;
      left: 0;
      overflow-y: auto;
      padding: 20px 12px 40px;
      transition: transform 0.25s ease;
      z-index: 50;
    }
    #sidebar::-webkit-scrollbar { width: 4px; }
    #sidebar::-webkit-scrollbar-thumb { background: var(--border-hi); border-radius: 4px; }
    .nav-section { margin-bottom: 6px; }
    .nav-section-header {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      font-size: 11px;
      font-weight: 700;
      letter-spacing: 0.8px;
      text-transform: uppercase;
      color: var(--text-faint);
      cursor: pointer;
      border-radius: 6px;
      user-select: none;
      transition: color 0.15s, background 0.15s;
    }
    .nav-section-header:hover { color: var(--text-dim); background: var(--bg-hover); }
    .nav-section-header .phase-dot {
      width: 8px; height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }
    .nav-section-header .chevron {
      margin-left: auto;
      transition: transform 0.2s;
      opacity: 0.5;
    }
    .nav-section.collapsed .chevron { transform: rotate(-90deg); }
    .nav-items { overflow: hidden; }
    .nav-section.collapsed .nav-items { display: none; }
    .nav-link {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 7px 10px 7px 22px;
      font-size: 13px;
      color: var(--text-dim);
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      line-height: 1.4;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .nav-link:hover {
      background: var(--bg-hover);
      color: var(--text);
      text-decoration: none;
    }
    .nav-link.active {
      background: rgba(79,142,247,0.12);
      color: var(--accent);
      font-weight: 500;
    }
    .nav-link.active::before {
      content: '';
      position: absolute;
      left: 0;
      width: 3px;
      height: 20px;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
    }
    .nav-link { position: relative; }
    .nav-icon { opacity: 0.6; font-size: 12px; flex-shrink: 0; }
    .nav-home {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 8px 10px;
      font-size: 13px;
      font-weight: 600;
      color: var(--text-dim);
      border-radius: 7px;
      cursor: pointer;
      margin-bottom: 12px;
      transition: background 0.15s, color 0.15s;
      border: none;
      background: none;
      width: 100%;
      text-align: left;
    }
    .nav-home:hover { background: var(--bg-hover); color: var(--text); }
    .nav-home.active { color: var(--accent); background: rgba(79,142,247,0.10); }
    .nav-divider {
      height: 1px;
      background: var(--border);
      margin: 8px 10px 16px;
    }

    /* ── Content Area ────────────────────────────────────────────── */
    #content-area {
      margin-left: var(--sidebar-w);
      flex: 1;
      min-width: 0;
      display: flex;
      flex-direction: column;
      align-items: center;
    }
    #content-wrap {
      width: 100%;
      max-width: 860px;
      padding: 48px 48px 80px;
    }

    /* ── Breadcrumb ──────────────────────────────────────────────── */
    #breadcrumb {
      display: flex;
      align-items: center;
      gap: 6px;
      margin-bottom: 28px;
      font-size: 12px;
      color: var(--text-faint);
    }
    #breadcrumb span { color: var(--text-dim); }
    #breadcrumb .sep { opacity: 0.4; }

    /* ── Loader (instant — no spinner needed) ─────────────────── */
    #loader { display: none; }

    /* ── Markdown Content Styles ─────────────────────────────────── */
    #md-content {
      line-height: 1.75;
      /* slight fade-in */
      animation: fadeIn 0.25s ease;
    }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: none; } }

    #md-content h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 12px;
      background: var(--accent-grd);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1.25;
    }
    #md-content h2 {
      font-size: 1.35rem;
      font-weight: 600;
      color: var(--text);
      margin: 40px 0 14px;
      padding-bottom: 8px;
      border-bottom: 1px solid var(--border);
    }
    #md-content h3 {
      font-size: 1.05rem;
      font-weight: 600;
      color: var(--text);
      margin: 28px 0 10px;
    }
    #md-content h4 {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-dim);
      margin: 20px 0 8px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    #md-content p { margin-bottom: 14px; color: var(--text); font-size: 15px; }
    #md-content ul, #md-content ol {
      margin: 10px 0 14px 20px;
      font-size: 15px;
    }
    #md-content li { margin-bottom: 6px; color: var(--text); }
    #md-content li > ul, #md-content li > ol { margin-top: 6px; }
    #md-content strong { color: #f0f4ff; font-weight: 600; }
    #md-content em { color: var(--text-dim); }
    #md-content hr {
      border: none;
      border-top: 1px solid var(--border);
      margin: 36px 0;
    }
    #md-content a { color: var(--accent); transition: color 0.15s; }
    #md-content a:hover { color: #7fb7ff; }

    /* Blockquotes → Callout boxes */
    #md-content blockquote {
      border-left: 3px solid var(--accent);
      background: rgba(79,142,247,0.07);
      border-radius: 0 8px 8px 0;
      padding: 14px 18px;
      margin: 16px 0;
      color: var(--text-dim);
      font-size: 14px;
    }
    #md-content blockquote p { margin: 0; color: var(--text-dim); }
    #md-content blockquote strong { color: var(--accent); }

    /* Code blocks */
    #md-content pre {
      background: #0e1117 !important;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 18px 20px;
      overflow-x: auto;
      margin: 16px 0;
      position: relative;
    }
    #md-content pre code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13.5px;
      background: none;
      padding: 0;
      border: none;
      border-radius: 0;
      line-height: 1.65;
    }
    /* Copy button */
    #md-content pre .copy-btn {
      position: absolute;
      top: 10px; right: 10px;
      background: var(--bg-hover);
      border: 1px solid var(--border-hi);
      border-radius: 6px;
      color: var(--text-dim);
      font-size: 11px;
      font-family: 'Inter', sans-serif;
      padding: 4px 10px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.2s, background 0.15s, color 0.15s;
    }
    #md-content pre:hover .copy-btn { opacity: 1; }
    #md-content pre .copy-btn:hover { background: var(--bg-card); color: var(--text); }
    #md-content pre .copy-btn.copied { color: var(--green); border-color: var(--green); }

    /* Inline code */
    #md-content code {
      font-family: 'JetBrains Mono', monospace;
      font-size: 12.5px;
      background: rgba(79,142,247,0.10);
      color: #a5c8ff;
      padding: 2px 6px;
      border-radius: 5px;
      border: 1px solid rgba(79,142,247,0.15);
    }

    /* Tables */
    #md-content table {
      width: 100%;
      border-collapse: collapse;
      margin: 16px 0;
      font-size: 14px;
      border-radius: var(--radius);
      overflow: hidden;
      border: 1px solid var(--border);
    }
    #md-content th {
      background: var(--bg-card);
      color: var(--text-dim);
      font-weight: 600;
      font-size: 12px;
      text-transform: uppercase;
      letter-spacing: 0.5px;
      padding: 10px 16px;
      text-align: left;
      border-bottom: 1px solid var(--border-hi);
    }
    #md-content td {
      padding: 10px 16px;
      border-bottom: 1px solid var(--border);
      color: var(--text);
      vertical-align: top;
    }
    #md-content tr:last-child td { border-bottom: none; }
    #md-content tr:hover td { background: rgba(255,255,255,0.02); }

    /* Checkboxes */
    #md-content input[type="checkbox"] {
      appearance: none;
      width: 14px; height: 14px;
      border: 2px solid var(--border-hi);
      border-radius: 4px;
      display: inline-block;
      vertical-align: middle;
      margin-right: 6px;
      position: relative;
      cursor: default;
      flex-shrink: 0;
    }
    #md-content input[type="checkbox"]:checked {
      background: var(--accent);
      border-color: var(--accent);
    }
    #md-content input[type="checkbox"]:checked::after {
      content: '✓';
      position: absolute;
      top: -2px; left: 1px;
      font-size: 10px;
      color: white;
    }

    /* Task list items */
    #md-content li:has(input[type="checkbox"]) {
      list-style: none;
      display: flex;
      align-items: flex-start;
      gap: 4px;
      margin-left: -20px;
    }

    /* ── TOC (right panel) ───────────────────────────────────────── */
    #toc-panel {
      position: fixed;
      top: calc(var(--topbar-h) + 40px);
      right: 24px;
      width: 200px;
      font-size: 12px;
    }
    .toc-title {
      font-size: 10px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.8px;
      color: var(--text-faint);
      margin-bottom: 8px;
      padding-left: 8px;
    }
    .toc-link {
      display: block;
      padding: 5px 8px;
      color: var(--text-faint);
      border-left: 2px solid var(--border);
      transition: color 0.15s, border-color 0.15s;
      cursor: pointer;
      line-height: 1.4;
      font-size: 12px;
    }
    .toc-link:hover { color: var(--text); border-left-color: var(--accent); }
    .toc-link.toc-h3 { padding-left: 16px; font-size: 11px; }
    .toc-link.active { color: var(--accent); border-left-color: var(--accent); }

    /* ── Progress bar ────────────────────────────────────────────── */
    #progress-bar {
      position: fixed;
      top: var(--topbar-h);
      left: 0; right: 0;
      height: 2px;
      background: var(--border);
      z-index: 99;
    }
    #progress-fill {
      height: 100%;
      background: var(--accent-grd);
      width: 0%;
      transition: width 0.1s linear;
    }

    /* ── Phase colors ────────────────────────────────────────────── */
    .dot-p0 { background: #4f8ef7; }
    .dot-p1 { background: #7c5ff7; }
    .dot-p2 { background: #34d399; }
    .dot-p3 { background: #fbbf24; }
    .dot-p4 { background: #f87171; }
    .dot-p5 { background: #fb923c; }

    /* ── Next / Prev navigation ──────────────────────────────────── */
    #page-nav {
      display: flex;
      gap: 16px;
      margin-top: 56px;
      padding-top: 28px;
      border-top: 1px solid var(--border);
    }
    .page-nav-btn {
      flex: 1;
      display: flex;
      flex-direction: column;
      gap: 4px;
      padding: 16px 20px;
      background: var(--bg-card);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      cursor: pointer;
      transition: border-color 0.2s, background 0.2s, transform 0.15s;
    }
    .page-nav-btn:hover {
      border-color: var(--accent);
      background: var(--bg-hover);
      transform: translateY(-2px);
    }
    .page-nav-btn.right { text-align: right; }
    .page-nav-btn .nav-label {
      font-size: 11px;
      color: var(--text-faint);
      text-transform: uppercase;
      letter-spacing: 0.5px;
      font-weight: 600;
    }
    .page-nav-btn .nav-title {
      font-size: 14px;
      color: var(--accent);
      font-weight: 500;
    }

    /* ── Sidebar overlay (mobile) ────────────────────────────────── */
    #sidebar-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.6);
      z-index: 49;
    }

    /* ── Responsive ──────────────────────────────────────────────── */
    @media (max-width: 1200px) {
      #toc-panel { display: none; }
    }
    @media (max-width: 860px) {
      #sidebar {
        transform: translateX(-100%);
      }
      #sidebar.open {
        transform: translateX(0);
        box-shadow: var(--shadow);
      }
      #sidebar-overlay.open { display: block; }
      #menu-toggle { display: flex; }
      #content-area { margin-left: 0; }
      #content-wrap { padding: 32px 24px 60px; }
      #md-content h1 { font-size: 1.5rem; }
    }
    @media (max-width: 500px) {
      #content-wrap { padding: 24px 16px 48px; }
      #search-input { width: 150px; }
      #search-input:focus { width: 180px; }
    }
  </style>
</head>
<body>

<!-- Progress Bar -->
<div id="progress-bar"><div id="progress-fill"></div></div>

<!-- Top Bar -->
<header id="topbar">
  <button id="menu-toggle" aria-label="Toggle menu">
    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
      <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
    </svg>
  </button>
  <a class="logo" href="#" onclick="loadPage('README.md','Home','');return false;">
    <div class="logo-icon">⚙</div>
    SysProg <span>&nbsp;/ C++</span>
  </a>
  <div class="topbar-right">
    <div id="search-wrap">
      <span id="search-icon">
        <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
          <circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/>
        </svg>
      </span>
      <input id="search-input" type="text" placeholder="Search docs…" autocomplete="off" />
      <div id="search-results"></div>
    </div>
    <span class="phase-badge" id="current-phase-badge">Home</span>
  </div>
</header>

<!-- Sidebar Overlay (mobile) -->
<div id="sidebar-overlay"></div>

<!-- Shell -->
<div id="shell">

  <!-- Sidebar -->
  <nav id="sidebar">
    <button class="nav-home active" id="nav-home" onclick="loadPage('README.md','Home','')">
      🏠&nbsp; Home &amp; Overview
    </button>
    <div class="nav-divider"></div>

    <!-- Phase sections populated by JS -->
    <div id="nav-phases"></div>
  </nav>

  <!-- Content Area -->
  <main id="content-area">
    <div id="content-wrap">
      <div id="breadcrumb"></div>
      <div id="loader"></div>
      <div id="md-content"></div>
      <div id="page-nav"></div>
    </div>
  </main>

  <!-- TOC Panel -->
  <aside id="toc-panel"></aside>
</div>

<script>
// ── Navigation Data ─────────────────────────────────────────────────────────
const NAV = [
  {
    id: 'p0',
    label: 'Phase 0 — C++ Core Gaps',
    dot: 'dot-p0',
    badge: 'Phase 0',
    items: [
      { title: 'Overview', file: '00-cpp-core-gaps/README.md', icon: '📋' },
      { title: 'RAII', file: '00-cpp-core-gaps/01-raii.md', icon: '🔒' },
      { title: 'Move Semantics', file: '00-cpp-core-gaps/02-move-semantics.md', icon: '🚀' },
      { title: 'Pointers & Smart Ptrs', file: '00-cpp-core-gaps/03-pointers-smart-ptrs.md', icon: '📌' },
      { title: 'Casting', file: '00-cpp-core-gaps/04-casting.md', icon: '🔄' },
      { title: 'Undefined Behavior', file: '00-cpp-core-gaps/05-undefined-behavior.md', icon: '⚠️' },
      { title: 'Struct Layout', file: '00-cpp-core-gaps/06-struct-layout.md', icon: '📐' },
    ]

// Build flat list for prev/next and search
const FLAT = [{ title: 'Home', file: 'README.md', phase: 'Home', badge: 'Home', icon: '🏠' }];

  phase.items.forEach(item => {
    FLAT.push({ ...item, phase: phase.label, badge: phase.badge });
  });
});

let currentFile = '';
let currentIndex = 0;

// ── Build Sidebar ────────────────────────────────────────────────────────────
function buildSidebar() {
  const container = document.getElementById('nav-phases');
  NAV.forEach(phase => {
    const section = document.createElement('div');
    section.className = 'nav-section';
    section.id = 'sec-' + phase.id;

    const header = document.createElement('div');
    header.className = 'nav-section-header';
    header.innerHTML = `
      <span class="phase-dot ${phase.dot}"></span>
      <span>${phase.label}</span>
      <svg class="chevron" width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5">
        <polyline points="6 9 12 15 18 9"/>
      </svg>`;
    header.onclick = () => section.classList.toggle('collapsed');

    const items = document.createElement('div');
    items.className = 'nav-items';
    phase.items.forEach(item => {
      const btn = document.createElement('button');
      btn.className = 'nav-link';
      btn.id = 'nl-' + item.file.replace(/[/\.]/g, '-');
      btn.innerHTML = `<span class="nav-icon">${item.icon}</span>${item.title}${item.stub ? ' <span style="font-size:10px;opacity:0.4;margin-left:auto">soon</span>' : ''}`;
      btn.onclick = () => loadPage(item.file, item.title, phase.badge);
      items.appendChild(btn);
    });

    section.appendChild(header);
    section.appendChild(items);
    container.appendChild(section);
  });
}

// ── Highlight active nav link ─────────────────────────────────────────────
function setActiveNav(file) {
  document.querySelectorAll('.nav-link').forEach(el => el.classList.remove('active'));
  document.getElementById('nav-home').classList.remove('active');

  if (file === 'README.md') {
    document.getElementById('nav-home').classList.add('active');
    return;
  }
  const id = 'nl-' + file.replace(/[/\.]/g, '-');
  const el = document.getElementById(id);
  if (el) {
    el.classList.add('active');
    // Expand parent section if collapsed
    const section = el.closest('.nav-section');
    if (section) section.classList.remove('collapsed');
  }
}

// ── Breadcrumb ───────────────────────────────────────────────────────────────
function setBreadcrumb(phase, title) {
  const bc = document.getElementById('breadcrumb');
  if (!phase || phase === 'Home') {
    bc.innerHTML = '<span>Home</span>';
  } else {
    bc.innerHTML = `<span>SysProg</span><span class="sep">›</span><span>${phase}</span><span class="sep">›</span><span>${title}</span>`;
  }
}

// ── TOC Builder ──────────────────────────────────────────────────────────────
function buildTOC() {
  const panel = document.getElementById('toc-panel');
  const headings = document.querySelectorAll('#md-content h2, #md-content h3');
  if (headings.length < 2) { panel.innerHTML = ''; return; }

  let html = '<div class="toc-title">On this page</div>';
  headings.forEach(h => {
    const isH3 = h.tagName === 'H3';
    const text = h.textContent.trim();
    html += `<div class="toc-link ${isH3 ? 'toc-h3' : ''}" onclick="document.getElementById('${h.id}').scrollIntoView({behavior:'smooth'})">${text}</div>`;
  });
  panel.innerHTML = html;

  // Observe headings to highlight active TOC link
  const tocLinks = panel.querySelectorAll('.toc-link');
  const observer = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        tocLinks.forEach(l => l.classList.remove('active'));
        const match = [...tocLinks].find(l => l.textContent.trim() === entry.target.textContent.trim());
        if (match) match.classList.add('active');
      }
    });
  }, { rootMargin: '-20% 0px -70% 0px' });
  headings.forEach(h => observer.observe(h));
}

// ── Add IDs to headings ──────────────────────────────────────────────────────
function addHeadingIds() {
  document.querySelectorAll('#md-content h2, #md-content h3, #md-content h4').forEach(h => {
    const id = h.textContent.trim().toLowerCase().replace(/[^a-z0-9\s]/g, '').replace(/\s+/g, '-');
    h.id = id;
  });
}

// ── Copy button ──────────────────────────────────────────────────────────────
function addCopyButtons() {
  document.querySelectorAll('#md-content pre').forEach(pre => {
    const btn = document.createElement('button');
    btn.className = 'copy-btn';
    btn.textContent = 'Copy';
    btn.onclick = () => {
      const code = pre.querySelector('code');
      navigator.clipboard.writeText(code ? code.textContent : pre.textContent).then(() => {
        btn.textContent = 'Copied!';
        btn.classList.add('copied');
        setTimeout(() => { btn.textContent = 'Copy'; btn.classList.remove('copied'); }, 2000);
      });
    };
    pre.appendChild(btn);
  });
}

// ── Prev / Next navigation ───────────────────────────────────────────────────
function buildPageNav(file) {
  const idx = FLAT.findIndex(p => p.file === file);
  const prev = idx > 0 ? FLAT[idx - 1] : null;
  const next = idx < FLAT.length - 1 ? FLAT[idx + 1] : null;
  const nav = document.getElementById('page-nav');

  nav.innerHTML = '';
  if (!prev && !next) return;

  if (prev) {
    const btn = document.createElement('div');
    btn.className = 'page-nav-btn';
    btn.innerHTML = `<span class="nav-label">← Previous</span><span class="nav-title">${prev.icon} ${prev.title}</span>`;
    btn.onclick = () => loadPage(prev.file, prev.title, prev.badge);
    nav.appendChild(btn);
  } else {
    nav.appendChild(document.createElement('div'));
  }
  if (next) {
    const btn = document.createElement('div');
    btn.className = 'page-nav-btn right';
    btn.innerHTML = `<span class="nav-label">Next →</span><span class="nav-title">${next.icon} ${next.title}</span>`;
    btn.onclick = () => loadPage(next.file, next.title, next.badge);
    nav.appendChild(btn);
  }
}

// ── Load page (reads from PAGES embedded by build.py — no server needed) ──────
function loadPage(file, title, phaseBadge) {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');

  currentFile = file;
  setActiveNav(file);
  setBreadcrumb(phaseBadge, title);
  document.getElementById('current-phase-badge').textContent = phaseBadge || 'Home';
  document.title = `${title} — SysProg C++`;

  const content = document.getElementById('md-content');
  content.innerHTML = '';
  document.getElementById('page-nav').innerHTML = '';
  document.getElementById('toc-panel').innerHTML = '';
  document.getElementById('progress-fill').style.width = '0%';
  history.pushState({}, '', '#' + encodeURIComponent(file));
  window.scrollTo({ top: 0 });

  const md = (typeof PAGES !== 'undefined') ? PAGES[file] : null;
  if (md) {
    marked.setOptions({ breaks: true, gfm: true });
    content.innerHTML = marked.parse(md);
    content.querySelectorAll('pre code').forEach(el => hljs.highlightElement(el));
    addHeadingIds();
    addCopyButtons();
    buildTOC();
  } else {
    content.innerHTML = `
      <div style="text-align:center;padding:80px 20px;color:var(--text-dim);">
        <div style="font-size:48px;margin-bottom:16px;">📄</div>
        <h2 style="color:var(--text);margin-bottom:8px;">Coming Soon</h2>
        <p>This topic hasn't been written yet. Check back as the docs grow!</p>
        <p style="margin-top:12px;font-size:13px;opacity:0.5">Run <code>python3 build.py</code> after adding new .md files.</p>
      </div>`;
  }
  buildPageNav(file);
}

// ── Scroll progress ──────────────────────────────────────────────────────────
window.addEventListener('scroll', () => {
  const el = document.documentElement;
  const scrolled = el.scrollTop / (el.scrollHeight - el.clientHeight) * 100;
  document.getElementById('progress-fill').style.width = Math.min(scrolled, 100) + '%';
});

// ── Search ───────────────────────────────────────────────────────────────────
const searchInput = document.getElementById('search-input');
const searchResults = document.getElementById('search-results');

searchInput.addEventListener('input', () => {
  const q = searchInput.value.trim().toLowerCase();
  if (!q) { searchResults.classList.remove('open'); searchResults.innerHTML = ''; return; }

  const matches = FLAT.filter(p =>
    p.title.toLowerCase().includes(q) ||
    p.phase.toLowerCase().includes(q) ||
    (p.file && p.file.toLowerCase().includes(q))
  ).slice(0, 8);

  if (!matches.length) {
    searchResults.innerHTML = '<div class="sr-item"><span class="sr-title" style="color:var(--text-faint)">No results found</span></div>';
  } else {
    searchResults.innerHTML = matches.map(m =>
      `<div class="sr-item" onclick="loadPage('${m.file}','${m.title}','${m.badge}');searchInput.value='';searchResults.classList.remove('open')">
        <div class="sr-title">${m.icon} ${m.title}</div>
        <div class="sr-phase">${m.phase}</div>
      </div>`
    ).join('');
  }
  searchResults.classList.add('open');
});

document.addEventListener('click', e => {
  if (!document.getElementById('search-wrap').contains(e.target)) {
    searchResults.classList.remove('open');
  }
});

searchInput.addEventListener('keydown', e => {
  if (e.key === 'Escape') { searchResults.classList.remove('open'); searchInput.blur(); }
});

// ── Mobile menu ──────────────────────────────────────────────────────────────
document.getElementById('menu-toggle').onclick = () => {
  document.getElementById('sidebar').classList.toggle('open');
  document.getElementById('sidebar-overlay').classList.toggle('open');
};
document.getElementById('sidebar-overlay').onclick = () => {
  document.getElementById('sidebar').classList.remove('open');
  document.getElementById('sidebar-overlay').classList.remove('open');
};

// ── Keyboard shortcut: / to focus search ─────────────────────────────────────
document.addEventListener('keydown', e => {
  if (e.key === '/' && document.activeElement.tagName !== 'INPUT') {
    e.preventDefault();
    searchInput.focus();
  }
});

// ── Init ─────────────────────────────────────────────────────────────────────
buildSidebar();

// Load from URL hash or default
const hash = decodeURIComponent(location.hash.slice(1));
if (hash && FLAT.find(p => p.file === hash)) {
  const page = FLAT.find(p => p.file === hash);
  loadPage(page.file, page.title, page.badge);
} else {
  loadPage('README.md', 'Home', 'Home');
}
